name: Demo Environment Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: kind-config.yaml
          cluster_name: toolhive-demo-in-a-box
          cloud_provider: true

      - name: Verify cluster is running
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Install ToolHive CLI
        uses: StacklokLabs/toolhive-actions/install@87b30f145f84b3186fd20e74c133111a5da24710 # v0.0.5

      - name: Install envsubst
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Run bootstrap script
        run: |
          chmod +x bootstrap.sh
          ./bootstrap.sh
        env:
          # Enable debug mode for better CI logging
          DEBUG: "1"

      - name: Run validation script
        run: |
          chmod +x validate.sh
          ./validate.sh
