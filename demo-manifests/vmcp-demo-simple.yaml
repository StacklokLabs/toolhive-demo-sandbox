apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: vmcp-demo
  namespace: toolhive-system
  annotations:
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-url: "http://$MCP_HOSTNAME/vmcp-demo/mcp"
    toolhive.stacklok.dev/registry-title: "vMCP Gateway"
    toolhive.stacklok.dev/authz-claims: '{"groups": "engineering"}'
    toolhive.stacklok.dev/registry-description: |
      Simple vMCP gateway that aggregates multiple tools and demonstrates tool filtering.
    toolhive.stacklok.dev/tool-definitions: '[{"name":"context7_query-docs","description":"Retrieves and queries up-to-date documentation and code examples from Context7 for any programming library or framework.\n\nYou must call ''Resolve Context7 Library ID'' tool first to obtain the exact Context7-compatible library ID required to use this tool, UNLESS the user explicitly provides a library ID in the format ''/org/project'' or ''/org/project/version'' in their query.\n\nIMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best information you have."},{"name":"context7_resolve-library-id","description":"Resolves a package/product name to a Context7-compatible library ID and returns matching libraries.\n\nYou MUST call this function before ''Query Documentation'' tool to obtain a valid Context7-compatible library ID UNLESS the user explicitly provides a library ID in the format ''/org/project'' or ''/org/project/version'' in their query.\n\nEach result includes:\n- Library ID: Context7-compatible identifier (format: /org/project)\n- Name: Library or package name\n- Description: Short summary\n- Code Snippets: Number of available code examples\n- Source Reputation: Authority indicator (High, Medium, Low, or Unknown)\n- Benchmark Score: Quality indicator (100 is the highest score)\n- Versions: List of versions if available. Use one of those versions if the user provides a version in their query. The format of the version is /org/project/version.\n\nFor best results, select libraries based on name match, source reputation, snippet coverage, benchmark score, and relevance to your use case.\n\nSelection Process:\n1. Analyze the query to understand what library/package the user is looking for\n2. Return the most relevant match based on:\n- Name similarity to the query (exact matches prioritized)\n- Description relevance to the query''s intent\n- Documentation coverage (prioritize libraries with higher Code Snippet counts)\n- Source reputation (consider libraries with High or Medium reputation more authoritative)\n- Benchmark Score: Quality indicator (100 is the highest score)\n\nResponse Format:\n- Return the selected library ID in a clearly marked section\n- Provide a brief explanation for why this library was chosen\n- If multiple good matches exist, acknowledge this but proceed with the most relevant one\n- If no good matches exist, clearly state this and suggest query refinements\n\nFor ambiguous queries, request clarification before proceeding with a best-guess match.\n\nIMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best result you have."},{"name":"fetch_fetch_internal_docs","description":"Fetch internal documentation URLs from https://docs.stacklok.com."},{"name":"grafana_get_dashboard_by_uid","description":"Retrieves the complete dashboard, including panels, variables, and settings, for a specific dashboard identified by its UID. WARNING: Large dashboards can consume significant context window space. Consider using get_dashboard_summary for overview or get_dashboard_property for specific data instead."},{"name":"grafana_get_dashboard_panel_queries","description":"Retrieve panel queries from a Grafana dashboard. Supports all datasource types (Prometheus, Loki, CloudWatch, SQL, etc.) and row-nested panels. Optionally filter to a specific panel by ID with `panelId`. Optionally provide `variables` for template variable substitution, which populates `processedQuery` and `requiredVariables` fields. Returns an array of objects with fields: title, query (raw expression), datasource (object with uid and type), and optionally processedQuery, refId, and requiredVariables."},{"name":"grafana_get_dashboard_property","description":"Get specific parts of a dashboard using JSONPath expressions to minimize context window usage. Common paths: ''$.title'' (title)\\, ''$.panels[*].title'' (all panel titles)\\, ''$.panels[0]'' (first panel)\\, ''$.templating.list'' (variables)\\, ''$.tags'' (tags)\\, ''$.panels[*].targets[*].expr'' (all queries). Use this instead of get_dashboard_by_uid when you only need specific dashboard properties."},{"name":"grafana_get_dashboard_summary","description":"Get a compact summary of a dashboard including title\\, panel count\\, panel types\\, variables\\, and other metadata without the full JSON. Use this for dashboard overview and planning modifications without consuming large context windows."},{"name":"grafana_get_datasource","description":"Retrieves detailed information about a specific datasource by UID or name. Returns the full datasource model, including name, type, URL, access settings, JSON data, and secure JSON field status. Provide either uid or name; uid takes priority if both are given."},{"name":"grafana_list_datasources","description":"List all configured datasources in Grafana. Use this to discover available datasources and their UIDs. Supports filtering by type and pagination."},{"name":"grafana_list_loki_label_names","description":"Lists all available label names (keys) found in logs within a specified Loki datasource and time range. Returns a list of unique label strings (e.g., `[\"app\", \"env\", \"pod\"]`). If the time range is not provided, it defaults to the last hour."},{"name":"grafana_list_loki_label_values","description":"Retrieves all unique values associated with a specific `labelName` within a Loki datasource and time range. Returns a list of string values (e.g., for `labelName=\"env\"`, might return `[\"prod\", \"staging\", \"dev\"]`). Useful for discovering filter options. Defaults to the last hour if the time range is omitted."},{"name":"grafana_list_prometheus_label_names","description":"List label names in a PromQL-compatible datasource (Prometheus, Thanos, Mimir, Cloud Monitoring, etc.). Allows filtering by series selectors and time range."},{"name":"grafana_list_prometheus_label_values","description":"Use after list_prometheus_metric_names to find label values for filtering queries. Gets the values for a specific label name in a PromQL-compatible datasource (Prometheus, Thanos, Mimir, Cloud Monitoring, etc.). Allows filtering by series selectors and time range."},{"name":"grafana_list_prometheus_metric_names","description":"DISCOVERY: Call this first to find available metrics before querying. Lists metric names in a PromQL-compatible datasource (Prometheus, Thanos, Mimir, Cloud Monitoring, etc.). Retrieves all metric names and filters them using the provided regex. Supports pagination."},{"name":"grafana_query_loki_logs","description":"Executes a LogQL query against a Loki datasource to retrieve log entries or metric values. Returns a list of results, each containing a timestamp, labels, and either a log line (`line`) or a numeric metric value (`value`). Defaults to the last hour, a limit of 10 entries, and ''backward'' direction (newest first). Supports full LogQL syntax for log and metric queries (e.g., `{app=\"foo\"} |= \"error\"`, `rate({app=\"bar\"}[1m])`). Prefer using `query_loki_stats` first to check stream size and `list_loki_label_names` and `list_loki_label_values` to verify labels exist."},{"name":"grafana_query_loki_stats","description":"Retrieves statistics about log streams matching a given LogQL *selector* within a Loki datasource and time range. Returns an object containing the count of streams, chunks, entries, and total bytes (e.g., `{\"streams\": 5, \"chunks\": 50, \"entries\": 10000, \"bytes\": 512000}`). The `logql` parameter **must** be a simple label selector (e.g., `{app=\"nginx\", env=\"prod\"}`) and does not support line filters, parsers, or aggregations. Defaults to the last hour if the time range is omitted."},{"name":"grafana_query_prometheus","description":"WORKFLOW: list_prometheus_metric_names -> list_prometheus_label_values -> query_prometheus. Query a PromQL-compatible datasource (Prometheus, Thanos, Mimir, Cloud Monitoring, etc.) using a PromQL expression. Supports instant queries (single point) and range queries (time range). Time: RFC3339 or relative expressions like ''now''\\, ''now-1h''."},{"name":"grafana_search_dashboards","description":"Search for Grafana dashboards by a query string. Returns a list of matching dashboards with details like title, UID, folder, tags, and URL."},{"name":"oci-registry_get_image_config","description":"Get the config for an OCI image"},{"name":"oci-registry_get_image_info","description":"Get information about an OCI image"},{"name":"oci-registry_get_image_manifest","description":"Get the manifest for an OCI image"},{"name":"oci-registry_get_referrer_content","description":"Fetch the content of a specific referrer artifact. Use list_referrers first to discover artifacts and their digests. Returns content as an embedded resource with proper MIME type. For cosign attestations (DSSE envelopes), automatically decodes the base64 payload unless decode_payload is false."},{"name":"oci-registry_list_referrers","description":"List OCI artifacts (SBOMs, signatures, provenance, VEX) attached to an image via the OCI Referrers API. Returns descriptors with artifact type, digest, size, and annotations. Use this to discover what attestations exist before fetching their content with get_referrer_content."},{"name":"oci-registry_list_tags","description":"List tags for a repository with pagination support"},{"name":"osv_get_vulnerability","description":"Get details for a specific vulnerability by ID"},{"name":"osv_query_vulnerability","description":"Query for vulnerabilities affecting a specific package version or commit"}]'
spec:
  groupRef:
    name: demo-tools
  config:
    groupRef: demo-tools
    telemetry:
      endpoint: mcp-collector.observability.svc.cluster.local:4318
      insecure: true
      serviceName: vmcp-demo-server
      serviceVersion: "1.0.0"
      metricsEnabled: true
      tracingEnabled: true
      samplingRate: "1.0"
      enablePrometheusMetricsPath: true
    audit:
      enabled: true
      includeRequestData: true
      includeResponseData: true
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
      tools:
        - workload: grafana
          filter:
            - "search_dashboards"
            - "get_dashboard_by_uid"
            - "get_dashboard_panel_queries"
            - "get_dashboard_property"
            - "get_dashboard_summary"
            - "list_datasources"
            - "get_datasource"
            - "query_prometheus"
            - "list_prometheus_metric_names"
            - "list_prometheus_label_names"
            - "list_prometheus_label_values"
            - "query_loki_stats"
            - "query_loki_logs"
            - "list_loki_label_names"
            - "list_loki_label_values"
        - workload: osv
          filter:
            # excludes the query_vulnerabilities_batch tool
            - "get_vulnerability"
            - "query_vulnerability"
        - workload: fetch
          overrides:
            fetch:
              name: fetch_internal_docs
              description: "Fetch internal documentation URLs from https://docs.stacklok.com."
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: inline
  serviceType: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmcp-demo-route
  namespace: toolhive-system
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vmcp-demo
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vmcp-vmcp-demo
          port: 4483
