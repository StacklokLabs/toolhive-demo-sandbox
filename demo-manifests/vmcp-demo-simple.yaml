apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: vmcp-demo
  namespace: toolhive-system
  annotations:
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-url: "http://$MCP_HOSTNAME/vmcp-demo/mcp"
    toolhive.stacklok.dev/registry-description: |
      Simple vMCP server with registry export enabled.
    toolhive.stacklok.dev/tool-definitions: '[{"name":"context7_query-docs","description":"Retrieves and queries up-to-date documentation and code examples from Context7 for any programming library or framework.\n\nYou must call ''resolve-library-id'' first to obtain the exact Context7-compatible library ID required to use this tool, UNLESS the user explicitly provides a library ID in the format ''/org/project'' or ''/org/project/version'' in their query.\n\nIMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best information you have."},{"name":"context7_resolve-library-id","description":"Resolves a package/product name to a Context7-compatible library ID and returns matching libraries.\n\nYou MUST call this function before ''query-docs'' to obtain a valid Context7-compatible library ID UNLESS the user explicitly provides a library ID in the format ''/org/project'' or ''/org/project/version'' in their query.\n\nSelection Process:\n1. Analyze the query to understand what library/package the user is looking for\n2. Return the most relevant match based on:\n- Name similarity to the query (exact matches prioritized)\n- Description relevance to the query''s intent\n- Documentation coverage (prioritize libraries with higher Code Snippet counts)\n- Source reputation (consider libraries with High or Medium reputation more authoritative)\n- Benchmark Score: Quality indicator (100 is the highest score)\n\nResponse Format:\n- Return the selected library ID in a clearly marked section\n- Provide a brief explanation for why this library was chosen\n- If multiple good matches exist, acknowledge this but proceed with the most relevant one\n- If no good matches exist, clearly state this and suggest query refinements\n\nFor ambiguous queries, request clarification before proceeding with a best-guess match.\n\nIMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best result you have."},{"name":"fetch_fetch_internal_docs","description":"Fetch internal documentation URLs from https://docs.stacklok.com."},{"name":"grafana_add_activity_to_incident","description":"Add a note (userNote activity) to an existing incident''s timeline using its ID. The note body can include URLs which will be attached as context. Use this to add context to an incident."},{"name":"grafana_create_alert_rule","description":"Creates a new Grafana alert rule with the specified configuration. Requires title, rule group, folder UID, condition, query data, no data state, execution error state, and duration settings."},{"name":"grafana_create_annotation","description":"Create a new annotation on a dashboard or panel. Set format to ''graphite'' and provide ''what'' for Graphite-format annotations."},{"name":"grafana_create_folder","description":"Create a Grafana folder. Provide a title and optional UID. Returns the created folder."},{"name":"grafana_create_incident","description":"Create a new Grafana incident. Requires title, severity, and room prefix. Allows setting status and labels. This tool should be used judiciously and sparingly, and only after confirmation from the user, as it may notify or alarm lots of people."},{"name":"grafana_delete_alert_rule","description":"Deletes a Grafana alert rule by its UID. This action cannot be undone."},{"name":"grafana_fetch_pyroscope_profile","description":"\nFetches a profile from a Pyroscope data source for a given time range. By default, the time range is tha past 1 hour.\nThe profile type is required, available profile types can be fetched via the list_pyroscope_profile_types tool. Not all\nprofile types are available for every service. Expect some queries to return empty result sets, this indicates the\nprofile type does not exist for that query. In such a case, consider trying a related profile type or giving up.\nMatchers are not required, but highly recommended, they are generally used to select an application by the service_name\nlabel (e.g. {service_name=\"foo\"}). Use the list_pyroscope_label_names tool to fetch available label names, and the\nlist_pyroscope_label_values tool to fetch available label values. The returned profile is in DOT format.\n"},{"name":"grafana_find_error_pattern_logs","description":"Searches Loki logs for elevated error patterns compared to the last day''s average, waits for the analysis to complete, and returns the results including any patterns found."},{"name":"grafana_find_slow_requests","description":"Searches relevant Tempo datasources for slow requests, waits for the analysis to complete, and returns the results."},{"name":"grafana_generate_deeplink","description":"Generate deeplink URLs for Grafana resources. Supports dashboards (requires dashboardUid), panels (requires dashboardUid and panelId), and Explore queries (requires datasourceUid). Optionally accepts time range and additional query parameters."},{"name":"grafana_get_alert_group","description":"Get a specific alert group from Grafana OnCall by its ID. Returns the full alert group details."},{"name":"grafana_get_alert_rule_by_uid","description":"Retrieves the full configuration and detailed status of a specific Grafana alert rule identified by its unique ID (UID). The response includes fields like title, condition, query data, folder UID, rule group, state settings (no data, error), evaluation interval, annotations, and labels."},{"name":"grafana_get_annotation_tags","description":"Returns annotation tags with optional filtering by tag name. Only the provided filters are applied."},{"name":"grafana_get_annotations","description":"Fetch Grafana annotations using filters such as dashboard UID, time range and tags."},{"name":"grafana_get_assertions","description":"Get assertion summary for a given entity with its type, name, env, site, namespace, and a time range"},{"name":"grafana_get_current_oncall_users","description":"Get the list of users currently on-call for a specific Grafana OnCall schedule ID. Returns the schedule ID, name, and a list of detailed user objects for those currently on call."},{"name":"grafana_get_dashboard_by_uid","description":"Retrieves the complete dashboard, including panels, variables, and settings, for a specific dashboard identified by its UID. WARNING: Large dashboards can consume significant context window space. Consider using get_dashboard_summary for overview or get_dashboard_property for specific data instead."},{"name":"grafana_get_dashboard_panel_queries","description":"Use this tool to retrieve panel queries and information from a Grafana dashboard. When asked about panel queries, queries in a dashboard, or what queries a dashboard contains, call this tool with the dashboard UID. The datasource is an object with fields `uid` (which may be a concrete UID or a template variable like \"$datasource\") and `type`. If the datasource UID is a template variable, it won''t be usable directly for queries. Returns an array of objects, each representing a panel, with fields: title, query, and datasource (an object with uid and type)."},{"name":"grafana_get_dashboard_property","description":"Get specific parts of a dashboard using JSONPath expressions to minimize context window usage. Common paths: ''$.title'' (title)\\, ''$.panels[*].title'' (all panel titles)\\, ''$.panels[0]'' (first panel)\\, ''$.templating.list'' (variables)\\, ''$.tags'' (tags)\\, ''$.panels[*].targets[*].expr'' (all queries). Use this instead of get_dashboard_by_uid when you only need specific dashboard properties."},{"name":"grafana_get_dashboard_summary","description":"Get a compact summary of a dashboard including title\\, panel count\\, panel types\\, variables\\, and other metadata without the full JSON. Use this for dashboard overview and planning modifications without consuming large context windows."},{"name":"grafana_get_datasource","description":"Retrieves detailed information about a specific datasource by UID or name. Returns the full datasource model, including name, type, URL, access settings, JSON data, and secure JSON field status. Provide either uid or name; uid takes priority if both are given."},{"name":"grafana_get_incident","description":"Get a single incident by ID. Returns the full incident details including title, status, severity, labels, timestamps, and other metadata."},{"name":"grafana_get_oncall_shift","description":"Get detailed information for a specific Grafana OnCall shift using its ID. A shift represents a designated time period within a schedule when users are actively on-call. Returns the full shift details."},{"name":"grafana_get_panel_image","description":"Render a Grafana dashboard panel or full dashboard as a PNG image. Returns the image as base64 encoded data. Requires the Grafana Image Renderer service to be installed. Use this for generating visual snapshots of dashboards for reports\\, alerts\\, or presentations."},{"name":"grafana_get_sift_analysis","description":"Retrieves a specific analysis from an investigation by its UUID. The investigation ID and analysis ID should be provided as strings in UUID format."},{"name":"grafana_get_sift_investigation","description":"Retrieves an existing Sift investigation by its UUID. The ID should be provided as a string in UUID format (e.g. ''02adab7c-bf5b-45f2-9459-d71a2c29e11b'')."},{"name":"grafana_list_alert_groups","description":"List alert groups from Grafana OnCall with filtering options. Supports filtering by alert group ID, route ID, integration ID, state (new, acknowledged, resolved, silenced), team ID, time range, labels, and name. For time ranges, use format ''{start}_{end}'' ISO 8601 timestamp range (e.g., ''2025-01-19T00:00:00_2025-01-19T23:59:59'' for a specific day). For labels, use format ''key:value'' (e.g., [''env:prod'', ''severity:high'']). Returns a list of alert group objects with their details. Supports pagination."},{"name":"grafana_list_alert_rules","description":"Lists Grafana alert rules, returning a summary including UID, title, current state (e.g., ''pending'', ''firing'', ''inactive''), and labels. Optionally query datasource-managed rules from Prometheus or Loki by providing datasourceUid. Supports filtering by labels using selectors and pagination. Example label selector: `[{''name'': ''severity'', ''type'': ''='', ''value'': ''critical''}]`. Inactive state means the alert state is normal, not firing"},{"name":"grafana_list_contact_points","description":"Lists Grafana notification contact points, returning a summary including UID, name, and type for each. Optionally query Alertmanager receivers by providing datasourceUid. Supports filtering by name - exact match - and limiting the number of results."},{"name":"grafana_list_datasources","description":"List all configured datasources in Grafana. Use this to discover available datasources and their UIDs. Supports filtering by type and pagination."},{"name":"grafana_list_incidents","description":"List Grafana incidents. Allows filtering by status (''active'', ''resolved'') and optionally including drill incidents. Returns a preview list with basic details."},{"name":"grafana_list_loki_label_names","description":"Lists all available label names (keys) found in logs within a specified Loki datasource and time range. Returns a list of unique label strings (e.g., `[\"app\", \"env\", \"pod\"]`). If the time range is not provided, it defaults to the last hour."},{"name":"grafana_list_loki_label_values","description":"Retrieves all unique values associated with a specific `labelName` within a Loki datasource and time range. Returns a list of string values (e.g., for `labelName=\"env\"`, might return `[\"prod\", \"staging\", \"dev\"]`). Useful for discovering filter options. Defaults to the last hour if the time range is omitted."},{"name":"grafana_list_oncall_schedules","description":"List Grafana OnCall schedules, optionally filtering by team ID. If a specific schedule ID is provided, retrieves details for only that schedule. Returns a list of schedule summaries including ID, name, team ID, timezone, and shift IDs. Supports pagination."},{"name":"grafana_list_oncall_teams","description":"List teams configured in Grafana OnCall. Returns a list of team objects with their details. Supports pagination."},{"name":"grafana_list_oncall_users","description":"List users from Grafana OnCall. These are OnCall users (separate from Grafana users). Can retrieve all users in the OnCall directory, a specific user by ID, or filter by username. Returns a list of user objects with their details. Supports pagination."},{"name":"grafana_list_prometheus_label_names","description":"List label names in a Prometheus datasource. Allows filtering by series selectors and time range."},{"name":"grafana_list_prometheus_label_values","description":"Use after list_prometheus_metric_names to find label values for filtering queries. Gets the values for a specific label name in Prometheus. Allows filtering by series selectors and time range."},{"name":"grafana_list_prometheus_metric_metadata","description":"List Prometheus metric metadata. Returns metadata about metrics currently scraped from targets. Note: This endpoint is experimental."},{"name":"grafana_list_prometheus_metric_names","description":"DISCOVERY: Call this first to find available metrics before querying. Lists metric names in a Prometheus datasource. Retrieves all metric names and filters them using the provided regex. Supports pagination."},{"name":"grafana_list_pyroscope_label_names","description":"\nLists all available label names (keys) found in profiles within a specified Pyroscope datasource, time range, and\noptional label matchers. Label matchers are typically used to qualify a service name ({service_name=\"foo\"}). Returns a\nlist of unique label strings (e.g., [\"app\", \"env\", \"pod\"]). Label names with double underscores (e.g. __name__) are\ninternal and rarely useful to users. If the time range is not provided, it defaults to the last hour.\n"},{"name":"grafana_list_pyroscope_label_values","description":"\nLists all available label values for a particular label name found in profiles within a specified Pyroscope datasource,\ntime range, and optional label matchers. Label matchers are typically used to qualify a service name ({service_name=\"foo\"}).\nReturns a list of unique label strings (e.g. for label name \"env\": [\"dev\", \"staging\", \"prod\"]). If the time range\nis not provided, it defaults to the last hour.\n"},{"name":"grafana_list_pyroscope_profile_types","description":"\nLists all available profile types available in a specified Pyroscope datasource and time range. Returns a list of all\navailable profile types (example profile type: \"process_cpu:cpu:nanoseconds:cpu:nanoseconds\"). A profile type has the\nfollowing structure: <name>:<sample type>:<sample unit>:<period type>:<period unit>. Not all profile types are available\nfor every service. If the time range is not provided, it defaults to the last hour.\n"},{"name":"grafana_list_sift_investigations","description":"Retrieves a list of Sift investigations with an optional limit. If no limit is specified, defaults to 10 investigations."},{"name":"grafana_query_loki_logs","description":"Executes a LogQL query against a Loki datasource to retrieve log entries or metric values. Returns a list of results, each containing a timestamp, labels, and either a log line (`line`) or a numeric metric value (`value`). Defaults to the last hour, a limit of 10 entries, and ''backward'' direction (newest first). Supports full LogQL syntax for log and metric queries (e.g., `{app=\"foo\"} |= \"error\"`, `rate({app=\"bar\"}[1m])`). Prefer using `query_loki_stats` first to check stream size and `list_loki_label_names` and `list_loki_label_values` to verify labels exist."},{"name":"grafana_query_loki_patterns","description":"Retrieves detected log patterns from a Loki datasource for a given stream selector and time range. Returns a list of patterns, each containing a pattern string and a total count of occurrences. Patterns help identify common log structures and anomalies. The `logql` parameter must be a stream selector (e.g., `{job=\"nginx\"}`) and does not support line filters or aggregations. Defaults to the last hour if the time range is omitted."},{"name":"grafana_query_loki_stats","description":"Retrieves statistics about log streams matching a given LogQL *selector* within a Loki datasource and time range. Returns an object containing the count of streams, chunks, entries, and total bytes (e.g., `{\"streams\": 5, \"chunks\": 50, \"entries\": 10000, \"bytes\": 512000}`). The `logql` parameter **must** be a simple label selector (e.g., `{app=\"nginx\", env=\"prod\"}`) and does not support line filters, parsers, or aggregations. Defaults to the last hour if the time range is omitted."},{"name":"grafana_query_prometheus","description":"WORKFLOW: list_prometheus_metric_names -> list_prometheus_label_values -> query_prometheus. Query Prometheus using a PromQL expression. Supports instant queries (single point) and range queries (time range). Time: RFC3339 or relative expressions like ''now''\\, ''now-1h''."},{"name":"grafana_query_prometheus_histogram","description":"Query Prometheus histogram percentiles. DISCOVER FIRST: Use list_prometheus_metric_names with regex=''.*_bucket$'' to find histograms.\n\nGenerates histogram_quantile PromQL. Example: metric=''http_duration'', percentile=95, labels=''job=\"api\"''\n\nTime formats: ''now-1h'', ''2026-02-02T19:00:00Z'', ''1738519200000'' (Unix ms)"},{"name":"grafana_search_dashboards","description":"Search for Grafana dashboards by a query string. Returns a list of matching dashboards with details like title, UID, folder, tags, and URL."},{"name":"grafana_search_folders","description":"Search for Grafana folders by a query string. Returns matching folders with details like title, UID, and URL."},{"name":"grafana_update_alert_rule","description":"Updates an existing Grafana alert rule identified by its UID. Requires all the same parameters as creating a new rule."},{"name":"grafana_update_annotation","description":"Updates the provided properties of an annotation by ID. Only fields included in the request are modified; omitted fields are left unchanged."},{"name":"grafana_update_dashboard","description":"Create or update a dashboard. Two modes: (1) Full JSON — provide ''dashboard'' for new dashboards or complete replacements. (2) Patch — provide ''uid'' + ''operations'' to make targeted changes to an existing dashboard. One of these two modes is required; ''folderUid''\\, ''message''\\, and ''overwrite'' are supplementary and do nothing on their own. Patch operations support JSONPaths like ''$.panels[0].targets[0].expr''\\, ''$.panels[1].title''\\, ''$.panels[2].targets[0].datasource''. Append to arrays with ''/- '' syntax: ''$.panels/- ''. Remove by index: {\"op\": \"remove\"\\, \"path\": \"$.panels[2]\"}. Multiple removes on the same array are automatically reordered to avoid index-shifting issues."},{"name":"oci-registry_get_image_config","description":"Get the config for an OCI image"},{"name":"oci-registry_get_image_info","description":"Get information about an OCI image"},{"name":"oci-registry_get_image_manifest","description":"Get the manifest for an OCI image"},{"name":"oci-registry_list_tags","description":"List tags for a repository with pagination support"},{"name":"osv_get_vulnerability","description":"Get details for a specific vulnerability by ID"},{"name":"osv_query_vulnerability","description":"Query for vulnerabilities affecting a specific package version or commit"}]'
spec:
  config:
    groupRef: demo-tools
    telemetry:
      endpoint: mcp-collector.observability:4318
      insecure: true
      serviceName: vmcp-demo-server
      serviceVersion: "1.0.0"
      metricsEnabled: true
      tracingEnabled: true
      samplingRate: "1.0"
      enablePrometheusMetricsPath: true
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
      tools:
        - workload: osv
          filter:
            # excludes the query_vulnerabilities_batch tool
            - "get_vulnerability"
            - "query_vulnerability"
        - workload: fetch
          overrides:
            fetch:
              name: fetch_internal_docs
              description: "Fetch internal documentation URLs from https://docs.stacklok.com."
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: inline
  serviceType: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmcp-demo-route
  namespace: toolhive-system
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vmcp-demo
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vmcp-vmcp-demo
          port: 4483
