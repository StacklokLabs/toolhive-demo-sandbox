# Shared tools — docs/fetch helpers available to every authenticated user.
# Aggregated by the vmcp-docs VirtualMCPServer.
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPGroup
metadata:
  name: shared-tools
  namespace: toolhive-system
spec:
  description: Docs/fetch helpers available to all personas
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: fetch
  namespace: toolhive-system
  labels:
    demo.toolhive.stacklok.dev/vmcp-backend: "true"
spec:
  image: ghcr.io/stackloklabs/gofetch/server:1.0.3
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8080
  groupRef:
    name: shared-tools
  telemetryConfigRef:
    name: shared-otel
    serviceName: fetch-server
  audit:
    enabled: true
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: context7
  namespace: toolhive-system
  labels:
    demo.toolhive.stacklok.dev/vmcp-backend: "true"
spec:
  image: ghcr.io/stacklok/dockyard/npx/context7:2.1.8
  groupRef:
    name: shared-tools
  transport: stdio
  proxyPort: 8080
  proxyMode: streamable-http
  telemetryConfigRef:
    name: shared-otel
    serviceName: context7-server
  audit:
    enabled: true
---
# Proxy in front of the hosted ToolHive docs MCP server. No remote auth
# required, so this can serve as a backend for vmcp-docs and also be
# published into the registry via K8s discovery.
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPRemoteProxy
metadata:
  name: toolhive-docs
  namespace: toolhive-system
  labels:
    demo.toolhive.stacklok.dev/vmcp-backend: "true"
  annotations:
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-url: "https://toolhive-doc-mcp.stacklok.com/mcp"
    toolhive.stacklok.dev/registry-title: "ToolHive Docs (Remote via Proxy)"
    toolhive.stacklok.dev/authz-claims: '{"groups": "everyone"}'
    toolhive.stacklok.dev/registry-description: |
      Hosted ToolHive documentation MCP, fronted by an in-cluster MCPRemoteProxy. Also aggregated into the vmcp-docs gateway.
    toolhive.stacklok.dev/tool-definitions: '[{"name":"query_docs","description":"Search Stacklok/ToolHive documentation and return relevant snippets with relevance scores."},{"name":"get_chunk","description":"Retrieve full details of a specific documentation chunk by its ID."}]'
spec:
  remoteUrl: https://toolhive-doc-mcp.stacklok.com/mcp
  transport: streamable-http
  proxyPort: 8080
  groupRef:
    name: shared-tools
  telemetryConfigRef:
    name: shared-otel
    serviceName: toolhive-docs-proxy
  audit:
    enabled: true
