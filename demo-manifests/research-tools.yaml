# Research tools — backends for the shared research workflow.
# Aggregated by the vmcp-research VirtualMCPServer.
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPGroup
metadata:
  name: research-tools
  namespace: toolhive-system
spec:
  description: Research workflow backends shared across personas
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: arxiv
  namespace: toolhive-system
  labels:
    demo.toolhive.stacklok.dev/vmcp-backend: "true"
spec:
  image: ghcr.io/stacklok/dockyard/uvx/arxiv-mcp-server:0.4.11
  groupRef:
    name: research-tools
  transport: stdio
  proxyPort: 8080
  proxyMode: streamable-http
  args:
    - --storage-path
    - /arxiv-papers
  podTemplateSpec:
    spec:
      volumes:
        - name: arxiv-papers
          emptyDir: {}
      containers:
        - name: mcp
          volumeMounts:
            - name: arxiv-papers
              mountPath: /arxiv-papers
  telemetryConfigRef:
    name: shared-otel
    serviceName: arxiv-server
  audit:
    enabled: true
