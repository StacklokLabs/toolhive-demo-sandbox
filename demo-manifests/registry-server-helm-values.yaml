# Registry Server Helm values for CloudNativePG (CNPG) backend

# Environment variable for pgpass file location
extraEnv:
  - name: PGPASSFILE
    value: /home/appuser/.pgpass

# Init container to prepare pgpass file with correct permissions
initContainers:
  - name: pgpass-init
    image: cgr.dev/chainguard/busybox:latest
    command:
      - sh
      - -c
      - |
        cp /secrets/.pgpass /pgpass/.pgpass
        chmod 600 /pgpass/.pgpass
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65535
    volumeMounts:
      - name: pgpass-secret
        mountPath: /secrets
        readOnly: true
      - name: pgpass
        mountPath: /pgpass

# Volumes for pgpass file and Traefik CA cert
extraVolumes:
  - name: pgpass-secret
    secret:
      secretName: cnpg-pgpass
  - name: pgpass
    emptyDir: {}
  - name: traefik-ca
    configMap:
      name: traefik-ca

extraVolumeMounts:
  - name: pgpass
    mountPath: /home/appuser/.pgpass
    subPath: .pgpass
    readOnly: true
  - name: traefik-ca
    mountPath: /etc/ssl/certs/traefik-ca.crt
    subPath: ca.crt
    readOnly: true

# Registry server configuration with CNPG PostgreSQL
config:
  sources:
    # Shared tools — visible to all authenticated users
    - name: toolhive-shared
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            - io.github.stacklok/notion-remote
            - io.github.stacklok/time
            - io.github.stacklok/toolhive-doc-mcp-remote
      claims:
        groups: everyone

    # Engineering tools — restricted to the engineering group
    - name: toolhive-engineering
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            - io.github.stacklok/aws-documentation
            - io.github.stacklok/filesystem
            - io.github.stacklok/playwright
      claims:
        groups: engineering

    # Finance tools — restricted to the finance group
    - name: toolhive-finance
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            - io.github.stacklok/stripe-remote
      claims:
        groups: finance

    # Official registry — engineering tools
    - name: official-engineering
      format: upstream
      api:
        endpoint: https://registry.modelcontextprotocol.io
      syncPolicy:
        interval: "1h"
      filter:
        names:
          include:
            - com.figma.mcp/mcp
            - com.gitlab/mcp
            - com.postman/postman-mcp-server
      claims:
        groups: engineering

    # Auto-discover MCP servers in the current Kubernetes cluster (visible to all authenticated users)
    - name: k8s
      kubernetes: {}
      claims:
        groups: everyone

    # Same K8s discovery but without claims — used by the public registry
    - name: k8s-public
      kubernetes: {}

    # ToolHive catalog without claims — used by the public registry
    - name: toolhive-public
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            - io.github.stacklok/notion-remote
            - io.github.stacklok/time
            - io.github.stacklok/toolhive-doc-mcp-remote
            - io.github.stacklok/aws-documentation
            - io.github.stacklok/filesystem
            - io.github.stacklok/playwright
            - io.github.stacklok/stripe-remote

  registries:
    - name: demo-registry
      sources:
        - toolhive-shared
        - toolhive-engineering
        - toolhive-finance
        - official-engineering
        - k8s

    # Unauthenticated registry for CLI access (thv, curl, etc.)
    - name: public
      sources:
        - toolhive-public
        - k8s-public

  # CNPG PostgreSQL database configuration
  # Uses the CNPG read-write service (registry-db-rw)
  database:
    host: registry-db-rw
    port: 5432
    user: db_app
    migrationUser: db_migrator
    database: registry
    sslMode: disable
    maxOpenConns: 10
    maxIdleConns: 5
    connMaxLifetime: "30m"

  auth:
    mode: oauth
    publicPaths:
      - /registry/public
    oauth:
      resourceUrl: https://$REGISTRY_HOSTNAME
      providers:
        - name: keycloak
          issuerUrl: https://$AUTH_HOSTNAME/realms/toolhive-demo
          audience: toolhive-registry-server
          allowPrivateIP: true
          caCertPath: /etc/ssl/certs/traefik-ca.crt
    authz:
      roles:
        # At least one role entry is required for Viper to recognize the authz
        # block as non-nil, which enables per-entry claims-based filtering.
        superAdmin:
          - preferred_username: demo

  telemetry:
    enabled: true
    serviceName: toolhive-registry-server
    endpoint: mcp-collector.observability:4318
    insecure: true
    metrics:
      enabled: true
    tracing:
      enabled: true
      sampling: 1.0
