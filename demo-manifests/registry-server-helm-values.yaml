# Registry Server Helm values for CloudNativePG (CNPG) backend.
# Rendered through envsubst in bootstrap.sh, then piped to helm upgrade --install.

# Pin the fullname so the Service is predictably named "registry-server"
# rather than the default "{release}-{chart}" form.
fullnameOverride: registry-server

# Environment variable for pgpass file location
extraEnv:
  - name: PGPASSFILE
    value: /home/appuser/.pgpass

# Init container to prepare pgpass file with correct permissions
initContainers:
  - name: pgpass-init
    image: cgr.dev/chainguard/busybox:latest
    command:
      - sh
      - -c
      - |
        cp /secrets/.pgpass /pgpass/.pgpass
        chmod 600 /pgpass/.pgpass
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65535
    volumeMounts:
      - name: pgpass-secret
        mountPath: /secrets
        readOnly: true
      - name: pgpass
        mountPath: /pgpass

# Volumes for pgpass file and Traefik CA cert
extraVolumes:
  - name: pgpass-secret
    secret:
      secretName: cnpg-pgpass
  - name: pgpass
    emptyDir: {}
  - name: traefik-ca
    configMap:
      name: traefik-ca

extraVolumeMounts:
  - name: pgpass
    mountPath: /home/appuser/.pgpass
    subPath: .pgpass
    readOnly: true
  - name: traefik-ca
    mountPath: /etc/ssl/certs/traefik-ca.crt
    subPath: ca.crt
    readOnly: true

config:
  sources:
    # Shared tools — visible to all authenticated users
    - name: toolhive-shared
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            # MCP servers
            - io.github.stacklok/notion-remote
            - io.github.stacklok/time
            # Skills
            - io.github.stacklok/agents-md
            - io.github.stacklok/doc-coauthoring
            - io.github.stacklok/skill-creator
      claims:
        groups: everyone

    # Engineering tools — restricted to the engineering group
    - name: toolhive-engineering
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            # MCP servers
            - io.github.stacklok/aws-documentation
            - io.github.stacklok/filesystem
            - io.github.stacklok/playwright
            # Skills
            - io.github.stacklok/ci-agent-hardening
            - io.github.stacklok/claude-settings-audit
            - io.github.stacklok/code-review
            - io.github.stacklok/security-review
            - io.github.stacklok/web-perf
      claims:
        groups: engineering

    # Finance tools — restricted to the finance group
    - name: toolhive-finance
      format: upstream
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-upstream.json
      syncPolicy:
        interval: "15m"
      filter:
        names:
          include:
            # MCP servers
            - io.github.stacklok/paypal
            - io.github.stacklok/stripe-remote
            # Skills
            - io.github.stacklok/claude-settings-audit
            - io.github.stacklok/stripe-best-practices
      claims:
        groups: finance

    # Official registry — engineering tools
    - name: official-engineering
      format: upstream
      api:
        endpoint: https://registry.modelcontextprotocol.io
      syncPolicy:
        interval: "1h"
      filter:
        names:
          include:
            - com.figma.mcp/mcp
            - com.gitlab/mcp
            - com.postman/postman-mcp-server
      claims:
        groups: engineering

    # Auto-discover MCP servers in the current Kubernetes cluster.
    # Per-server visibility is controlled by authz-claims annotations on each MCPServer.
    - name: kubernetes
      kubernetes: {}
      claims:
        groups: everyone

  registries:
    - name: demo-registry
      claims:
        groups: everyone
      sources:
        - toolhive-shared
        - toolhive-engineering
        - toolhive-finance
        - official-engineering
        - kubernetes

    # Unauthenticated registry for CLI access (thv, curl, etc.)
    - name: public
      sources:
        - toolhive-shared
        - toolhive-engineering
        - toolhive-finance
        - official-engineering
        - kubernetes

  auth:
    mode: oauth
    publicPaths:
      # Unauthenticated registry for CLI access (thv, curl, etc.)
      - /registry/public
    oauth:
      resourceUrl: https://$REGISTRY_HOSTNAME
      providers:
        - name: keycloak
          issuerUrl: https://$AUTH_HOSTNAME/realms/$KC_REALM
          audience: registry-server
          allowPrivateIP: true
          caCertPath: /etc/ssl/certs/traefik-ca.crt
    authz:
      roles:
        # At least one role entry is required for Viper to recognize the authz
        # block as non-nil, which enables per-entry claims-based filtering.
        superAdmin:
          - preferred_username: demo
        manageEntries:
          - groups: engineering

  telemetry:
    enabled: true
    serviceName: registry-server
    endpoint: mcp-collector.observability:4318
    insecure: true
    metrics:
      enabled: true
    tracing:
      enabled: true
      sampling: 1.0

  audit:
    enabled: true

  # CNPG PostgreSQL database configuration (password supplied via pgpass file).
  # cnpg-pgpass is created by infra/registry-server-db.yaml.
  database:
    host: registry-db-rw
    port: 5432
    user: db_app
    migrationUser: db_migrator
    database: registry
    sslMode: disable
    maxOpenConns: 10
    maxIdleConns: 5
    connMaxLifetime: "30m"
