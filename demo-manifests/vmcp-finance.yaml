# Finance vMCP gateway for the finance persona (Bob).
# Stub: currently exposes a single fetch-based tool badged for financial docs.
# Expand finance-tools.yaml with real backends (ledger, invoicing, etc.) as
# they become available.
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: vmcp-finance
  namespace: toolhive-system
  annotations:
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-url: "http://$MCP_HOSTNAME/vmcp-finance/mcp"
    toolhive.stacklok.dev/registry-title: "Finance vMCP Gateway"
    toolhive.stacklok.dev/authz-claims: '{"groups": "finance"}'
    toolhive.stacklok.dev/registry-description: |
      Finance persona gateway. Stubbed for now — currently exposes a financial-docs fetch tool; ledger and invoicing backends coming soon.
    toolhive.stacklok.dev/tool-definitions: '[{"name":"finance-fetch_fetch_financial_docs","description":"Fetch public financial filings and documentation (SEC, IRS, vendor pricing pages)."}]'
spec:
  groupRef:
    name: finance-tools
  config:
    groupRef: finance-tools
    telemetry:
      endpoint: mcp-collector.observability.svc.cluster.local:4318
      insecure: true
      serviceName: vmcp-finance-server
      serviceVersion: "1.0.0"
      metricsEnabled: true
      tracingEnabled: true
      samplingRate: "1.0"
      enablePrometheusMetricsPath: true
    audit:
      enabled: true
      includeRequestData: true
      includeResponseData: true
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
      tools:
        - workload: finance-fetch
          overrides:
            fetch:
              name: fetch_financial_docs
              description: "Fetch public financial filings and documentation (SEC, IRS, vendor pricing pages)."
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: inline
  serviceType: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmcp-finance-route
  namespace: toolhive-system
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vmcp-finance
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vmcp-vmcp-finance
          port: 4483
