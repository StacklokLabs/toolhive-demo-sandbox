# LibreChat configuration
# Mounted as /app/librechat.yaml inside the container
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: librechat
  labels:
    app: librechat
data:
  librechat.yaml: |
    version: 1.3.5
    cache: true

    endpoints:
      custom:
        - name: "OpenRouter"
          apiKey: "${OPENROUTER_API_KEY}"
          baseURL: "https://openrouter.ai/api/v1"
          models:
            default:
              - "anthropic/claude-sonnet-4.6"
              - "anthropic/claude-opus-4.6"
              - "anthropic/claude-haiku-4"
              - "openai/gpt-5.4"
              - "openai/gpt-5.4-mini"
              - "google/gemini-2.5-flash"
            fetch: false
          titleConvo: true
          titleModel: "anthropic/claude-sonnet-4.6"
          modelDisplayLabel: "OpenRouter"

    mcpSettings:
      allowedDomains:
        - "vmcp-vmcp-demo.toolhive-system.svc.cluster.local"

    mcpServers:
      toolhive-vmcp:
        type: streamable-http
        url: http://vmcp-vmcp-demo.toolhive-system.svc.cluster.local:4483/mcp
