global:
  librechat:
    existingSecretName: "librechat-credentials"
    existingSecretApiKey: OPENROUTER_API_KEY

librechat:
  configEnv:
    MONGO_URI: "mongodb://librechat-mongodb.librechat.svc.cluster.local:27017/LibreChat"
  existingSecretName: "librechat-credentials"

  configYamlContent: |
    version: 1.3.5
    cache: true

    endpoints:
      custom:
        - name: "OpenRouter"
          apiKey: "${OPENROUTER_API_KEY}"
          baseURL: "https://openrouter.ai/api/v1"
          models:
            default:
              - "anthropic/claude-sonnet-4.6"
              - "anthropic/claude-opus-4.6"
              - "anthropic/claude-haiku-4"
              - "openai/gpt-5.4"
              - "openai/gpt-5.4-mini"
              - "google/gemini-2.5-flash"
            fetch: false
          titleConvo: true
          titleModel: "anthropic/claude-sonnet-4.6"
          modelDisplayLabel: "OpenRouter"

    mcpSettings:
      allowedDomains:
        - "vmcp-vmcp-infra.toolhive-system.svc.cluster.local"
        - "vmcp-vmcp-docs.toolhive-system.svc.cluster.local"

    mcpServers:
      toolhive-infra:
        type: streamable-http
        url: http://vmcp-vmcp-infra.toolhive-system.svc.cluster.local:4483/mcp
      toolhive-docs:
        type: streamable-http
        url: http://vmcp-vmcp-docs.toolhive-system.svc.cluster.local:4483/mcp

  imageVolume:
    enabled: false

fullnameOverride: "librechat"

image:
  repository: danny-avila/librechat
  registry: ghcr.io
  tag: "v0.8.4"

ingress:
  enabled: false

mongodb:
  enabled: false

meilisearch:
  enabled: false

redis:
  enabled: false

librechat-rag-api:
  enabled: false

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi
