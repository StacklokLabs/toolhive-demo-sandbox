apiVersion: v1
kind: Service
metadata:
  name: librechat-mongodb
  namespace: librechat
  labels:
    app: librechat-mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongodb
  selector:
    app: librechat-mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: librechat-mongodb
  namespace: librechat
  labels:
    app: librechat-mongodb
spec:
  serviceName: librechat-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: librechat-mongodb
  template:
    metadata:
      labels:
        app: librechat-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
