# LibreChat-facing vMCP gateway. Aggregates the same infra-tools backends as
# vmcp-infra, but accepts Keycloak-issued user tokens instead of being
# anonymous — LibreChat forwards the logged-in user's access token on every
# MCP call via `Authorization: Bearer {{LIBRECHAT_OPENID_ACCESS_TOKEN}}`.
#
# Exposed in-cluster only (ClusterIP, no HTTPRoute, no registry-export) —
# this resource is only useful if the LibreChat addon is installed.
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPOIDCConfig
metadata:
  name: vmcp-chat-oidc
  namespace: toolhive-system
spec:
  type: inline
  inline:
    issuer: https://$AUTH_HOSTNAME/realms/toolhive-demo
    # Traefik serves the Keycloak hostname with a self-signed cert; mount the
    # CA so the vMCP pod can verify the issuer's TLS.
    caBundleRef:
      configMapRef:
        name: traefik-ca
        key: ca.crt
    # The Keycloak issuer resolves to the Traefik LB (a private RFC1918
    # address in this kind cluster). The vMCP otherwise refuses to fetch
    # OIDC discovery / JWKS from private IPs as an SSRF guard.
    jwksAllowPrivateIP: true
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: vmcp-chat
  namespace: toolhive-system
spec:
  groupRef:
    name: infra-tools
  telemetryConfigRef:
    name: shared-otel
    serviceName: vmcp-chat-server
  config:
    audit:
      enabled: true
      includeRequestData: true
      includeResponseData: true
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
      tools:
        - workload: prometheus
          filter:
            - "execute_query"
            - "execute_range_query"
            - "list_metrics"
            - "get_metric_metadata"
            - "get_targets"
        - workload: grafana
          filter:
            - "search_dashboards"
            - "get_dashboard_by_uid"
            - "get_dashboard_panel_queries"
            - "get_dashboard_property"
            - "get_dashboard_summary"
            - "list_datasources"
            - "get_datasource"
            - "query_prometheus"
            - "list_prometheus_metric_names"
            - "list_prometheus_label_names"
            - "list_prometheus_label_values"
            - "query_loki_stats"
            - "query_loki_logs"
            - "list_loki_label_names"
            - "list_loki_label_values"
        - workload: osv
          filter:
            - "get_vulnerability"
            - "query_vulnerability"
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: vmcp-chat-oidc
      audience: toolhive-vmcp-chat
  outgoingAuth:
    source: inline
  serviceType: ClusterIP
