apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: librechat-route
  namespace: librechat
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - $LIBRECHAT_HOSTNAME
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: librechat
          port: 3080
