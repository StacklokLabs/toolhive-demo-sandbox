apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-ui
  namespace: toolhive-system
spec:
  template:
    spec:
      containers:
        - name: cloud-ui
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openrouter-api-key
                  key: api-key
