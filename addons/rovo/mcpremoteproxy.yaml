# Atlassian Rovo MCP Remote Proxy with Embedded Auth Server (Dynamic Client Registration)
#
# This manifest proxies the Atlassian remote MCP server through ToolHive,
# handling OAuth 2.0 authentication via an embedded auth server that delegates
# to the Atlassian MCP server's own OAuth 2.0 authorization server. Client
# credentials are obtained at runtime via RFC 7591 Dynamic Client Registration —
# no pre-provisioned Atlassian OAuth app is required.
#
# Auth flow:
#
#   MCP Client (Claude Desktop, etc.)
#     → OAuth 2.0 auth code flow with embedded auth server
#     → EAS resolves Atlassian DCR discovery → registers client at runtime
#     → EAS redirects user to https://mcp.atlassian.com/v1/authorize
#     → User authenticates via Atlassian SSO
#     → EAS exchanges code at https://cf.mcp.atlassian.com/v1/token
#     → EAS issues a ToolHive JWT (stores Atlassian token internally)
#     → Client sends MCP request with ToolHive JWT
#     → Proxy validates JWT (via oidcConfig → embedded auth server issuer)
#     → Upstream swap middleware replaces ToolHive JWT with stored Atlassian token
#     → Request forwarded to https://mcp.atlassian.com/v1/mcp
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ ENVIRONMENT VARIABLES                                               │
# │                                                                     │
# │   $ROVO_MCP_HOSTNAME   Traefik ingress hostname for this proxy      │
# │                        (e.g. rovo-mcp-172-19-0-5.traefik.me)        │
# │                                                                     │
# │ No Atlassian client credentials are needed — DCR handles            │
# │ registration at runtime against the MCP server's OAuth metadata.    │
# └─────────────────────────────────────────────────────────────────────┘

---
# MCPExternalAuthConfig: Embedded auth server with the Atlassian MCP OAuth
# server as the upstream IDP. Uses RFC 7591 Dynamic Client Registration —
# the authserver fetches the discovery document and registers itself at
# runtime, so no static clientId/clientSecret is required.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPExternalAuthConfig
metadata:
  name: rovo-mcp-eas
  namespace: toolhive-system
spec:
  type: embeddedAuthServer
  embeddedAuthServer:
    # Issuer must match the external URL where MCP clients reach the proxy's
    # auth endpoints (/.well-known/openid-configuration, /oauth/*, etc.)
    issuer: https://$ROVO_MCP_HOSTNAME
    upstreamProviders:
      - name: atlassian
        type: oauth2
        oauth2Config:
          # AuthorizationEndpoint and TokenEndpoint are required by the CRD
          # schema even when DCR is used. The DCR resolver re-reads these
          # values from the discovery document at runtime; the values here
          # match what discoveryUrl publishes.
          authorizationEndpoint: https://mcp.atlassian.com/v1/authorize
          tokenEndpoint: https://cf.mcp.atlassian.com/v1/token
          redirectUri: https://$ROVO_MCP_HOSTNAME/oauth/callback
          scopes:
            - offline_access
          dcrConfig:
            # Use the cf-prefixed host: the discovery doc claims
            # issuer="https://cf.mcp.atlassian.com", and ToolHive enforces
            # RFC 8414 §3.3 issuer equality between the URL prefix and the
            # metadata's issuer claim. The plain mcp.atlassian.com host
            # serves the same document but its URL prefix doesn't match
            # the issuer claim, so discovery would fail there.
            discoveryUrl: https://cf.mcp.atlassian.com/.well-known/oauth-authorization-server

---
# MCPOIDCConfig: Validates ToolHive JWTs issued by the embedded auth server.
# The issuer must match the embedded auth server's issuer above.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: rovo-mcp-oidc
  namespace: toolhive-system
spec:
  type: inline
  inline:
    issuer: https://$ROVO_MCP_HOSTNAME
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true

---
# MCPRemoteProxy: Ties everything together.
#   - authServerRef  → embedded auth server (incoming MCP client auth)
#   - oidcConfigRef  → validates ToolHive JWTs between EAS and upstream
#   The upstream swap middleware automatically replaces the ToolHive JWT
#   with the stored Atlassian token before forwarding to the remote MCP server.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPRemoteProxy
metadata:
  name: rovo-mcp-proxy
  namespace: toolhive-system
  annotations:
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-url: "https://$ROVO_MCP_HOSTNAME/mcp"
    toolhive.stacklok.dev/registry-title: "Atlassian Rovo MCP Server"
    toolhive.stacklok.dev/registry-description: "Jira, Confluence, and Rovo agent access via Atlassian OAuth 2.0 with Dynamic Client Registration. Scoped to the authenticated user's existing permissions."
spec:
  remoteUrl: https://mcp.atlassian.com/v1/mcp
  transport: streamable-http
  proxyPort: 8080

  authServerRef:
    kind: MCPExternalAuthConfig
    name: rovo-mcp-eas

  oidcConfigRef:
    name: rovo-mcp-oidc
    audience: https://$ROVO_MCP_HOSTNAME/mcp
    resourceUrl: https://$ROVO_MCP_HOSTNAME/mcp

  audit:
    enabled: true

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

---
# HTTPRoute: Expose the proxy via Traefik ingress with TLS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rovo-mcp-proxy-route
  namespace: toolhive-system
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - $ROVO_MCP_HOSTNAME
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mcp-rovo-mcp-proxy-remote-proxy
          port: 8080
