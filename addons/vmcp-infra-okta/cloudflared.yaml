# Cloudflare tunnel that exposes vmcp-infra-okta externally over HTTPS.
# The tunnel's public hostname must match ${VMCP_OKTA_CLOUDFLARED_DOMAIN};
# configure it in the Cloudflare dashboard to point at
# vmcp-vmcp-infra-okta.toolhive-system.svc.cluster.local:4483
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: vmcp-infra-okta
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
