apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-toolhive-manager
rules:
  # ToolHive CRDs — full CRUD for MCPServers, read for others
  - apiGroups: ['toolhive.stacklok.dev']
    resources: ['mcpservers']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['toolhive.stacklok.dev']
    resources: ['mcpservers/status']
    verbs: ['get', 'watch', 'list']
  - apiGroups: ['toolhive.stacklok.dev']
    resources: ['mcpgroups', 'virtualmcpservers', 'mcpregistries', 'mcpremoteproxies', 'mcpserverentries']
    verbs: ['get', 'list', 'watch']
  # Core resources — read-only for dashboard visibility
  - apiGroups: ['']
    resources: ['pods', 'services', 'configmaps']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['get', 'list', 'watch']
