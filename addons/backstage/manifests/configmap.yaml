apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: ToolHive Developer Portal
      baseUrl: http://$BACKSTAGE_HOSTNAME
      extensions:
        - notifications: false
        - nav-item:notifications: false

    organization:
      name: ToolHive Demo

    backend:
      baseUrl: http://$BACKSTAGE_HOSTNAME
      listen:
        port: 7007
      discovery:
        endpoints:
          - target: 'http://localhost:7007/api/{{pluginId}}'
            plugins: ['catalog', 'scaffolder', 'toolhive']
      csp:
        connect-src: ["'self'", 'http:', 'https:']
      cors:
        origin: http://$BACKSTAGE_HOSTNAME
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: better-sqlite3
        connection: ':memory:'

    auth:
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

    permission:
      enabled: false

    # ToolHive Registry Server — uses the sandbox's in-cluster service
    # The public registry at /registry/public requires no authentication
    toolhive:
      registryUrl: 'http://toolhive-registry-api.toolhive-system.svc.cluster.local:8080'
      registryName: 'public'

    kubernetes:
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - name: 'toolhive-demo'
              url: 'https://kubernetes.default.svc'
              authProvider: 'serviceAccount'
              skipTLSVerify: true
              customResources:
                - group: 'toolhive.stacklok.dev'
                  apiVersion: 'v1beta1'
                  plural: 'mcpservers'

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, API, Resource, Location, Template]
      locations:
        - type: file
          target: /app/examples/entities.yaml
        - type: file
          target: /app/examples/template/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: /app/examples/org.yaml
          rules:
            - allow: [User, Group]
        - type: file
          target: /app/templates/deploy-mcp-server/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: /app/templates/deploy-mcp-fetch/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: /app/templates/deploy-mcp-github/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: /app/templates/deploy-from-registry/template.yaml
          rules:
            - allow: [Template]
