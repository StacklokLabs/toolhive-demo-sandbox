        namespace:
          title: Namespace
          type: string
          default: mcp-workloads
          description: Kubernetes namespace to deploy into
    - title: Environment Variables (optional)
      description: >-
        Provide values for any environment variables required by the server.
        Check the registry page at /toolhive/registry for which variables are needed.
      properties:
        envVars:
          title: Environment Variables
          type: array
          items:
            type: object
            required:
              - name
              - value
            properties:
              name:
                title: Name
                type: string
              value:
                title: Value
                type: string
  steps:
    - id: deploy
      name: Deploy from Registry
      action: toolhive:registry:deploy
      input:
        serverName: ${{ parameters.serverName }}
        namespace: ${{ parameters.namespace }}
        env: ${{ parameters.envVars }}
  output:
    links:
      - title: View in MCP Server Dashboard
        url: /toolhive/${{ steps.deploy.output.namespace }}/${{ steps.deploy.output.serverName }}
