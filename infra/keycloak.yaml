---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: toolhive
data:
  toolhive-demo-realm.json: |
    {
      "realm": "toolhive-demo",
      "enabled": true,
      "displayName": "ToolHive Demo",
      "sslRequired": "external",
      "rememberMe": true,
      "accessTokenLifespan": 3600,
      "ssoSessionIdleTimeout": 7200,
      "ssoSessionMaxLifespan": 36000,
      "clients": [
        {
          "clientId": "toolhive-cloud-ui",
          "name": "ToolHive Cloud UI",
          "description": "ToolHive Cloud UI web application",
          "enabled": true,
          "secret": "cloud-ui-secret-change-in-production",
          "redirectUris": [
            "https://$UI_HOSTNAME/api/auth/oauth2/callback/keycloak",
            "https://$UI_HOSTNAME/api/auth/callback/keycloak",
            "http://localhost:3000/*"
          ],
          "webOrigins": ["+"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "attributes": {
            "post.logout.redirect.uris": "https://$UI_HOSTNAME/signin##http://localhost:3000/signin",
            "backchannel.logout.session.required": "true",
            "oauth2.device.authorization.grant.enabled": "true"
          },
          "protocolMappers": [
            {
              "name": "registry-server-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "included.custom.audience": "toolhive-registry-server",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            }
          ],
          "defaultClientScopes": ["openid", "email", "profile", "roles", "groups", "web-origins"],
          "optionalClientScopes": ["offline_access", "mcp-access"]
        },
        {
          "clientId": "mcp-vmcp-authenticated",
          "name": "vMCP Authenticated Server",
          "description": "MCP server with OIDC authentication",
          "enabled": true,
          "secret": "vmcp-secret-change-in-production",
          "redirectUris": ["*"],
          "webOrigins": ["+"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true,
          "publicClient": false,
          "attributes": {
            "backchannel.logout.session.required": "true",
            "oauth2.device.authorization.grant.enabled": "true"
          },
          "defaultClientScopes": ["openid", "email", "profile", "roles", "web-origins"],
          "optionalClientScopes": ["offline_access", "mcp-access"]
        }
      ],
      "clientScopes": [
        {
          "name": "openid",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "false", "display.on.consent.screen": "false" }
        },
        {
          "name": "email",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "true", "display.on.consent.screen": "true" },
          "protocolMappers": [
            {
              "name": "email",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "email",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "email",
                "jsonType.label": "String"
              }
            },
            {
              "name": "email verified",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "emailVerified",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "email_verified",
                "jsonType.label": "boolean"
              }
            }
          ]
        },
        {
          "name": "profile",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "true", "display.on.consent.screen": "true" },
          "protocolMappers": [
            {
              "name": "username",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "username",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "preferred_username",
                "jsonType.label": "String"
              }
            },
            {
              "name": "given name",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "firstName",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "given_name",
                "jsonType.label": "String"
              }
            }
          ]
        },
        {
          "name": "offline_access",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "true", "display.on.consent.screen": "true" }
        },
        {
          "name": "roles",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "false", "display.on.consent.screen": "false" }
        },
        {
          "name": "web-origins",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "false", "display.on.consent.screen": "false" }
        },
        {
          "name": "mcp-access",
          "description": "Access to MCP servers",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true",
            "consent.screen.text": "Access MCP servers"
          }
        },
        {
          "name": "groups",
          "description": "Group membership claims",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "users": [
        {
          "username": "demo",
          "enabled": true,
          "emailVerified": true,
          "email": "demo@example.com",
          "firstName": "Demo",
          "lastName": "User",
          "credentials": [
            { "type": "password", "value": "demo", "temporary": false }
          ],
          "realmRoles": ["default-roles-toolhive-demo"],
          "groups": ["/everyone", "/engineering", "/finance"]
        },
        {
          "username": "alice",
          "enabled": true,
          "emailVerified": true,
          "email": "alice.chen@example.com",
          "firstName": "Alice",
          "lastName": "Chen",
          "credentials": [
            { "type": "password", "value": "alice", "temporary": false }
          ],
          "realmRoles": ["default-roles-toolhive-demo"],
          "groups": ["/everyone", "/engineering"]
        },
        {
          "username": "bob",
          "enabled": true,
          "emailVerified": true,
          "email": "bob.smith@example.com",
          "firstName": "Bob",
          "lastName": "Smith",
          "credentials": [
            { "type": "password", "value": "bob", "temporary": false }
          ],
          "realmRoles": ["default-roles-toolhive-demo"],
          "groups": ["/everyone", "/finance"]
        }
      ],
      "groups": [
        { "name": "everyone",    "path": "/everyone"    },
        { "name": "engineering", "path": "/engineering" },
        { "name": "finance",     "path": "/finance"     }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: toolhive
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: toolhive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: toolhive
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:$KEYCLOAK_VERSION
          args:
            - start-dev
            - --import-realm
          env:
            - name: KC_DB
              value: "dev-mem"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              value: "https://$AUTH_HOSTNAME"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/ready
              port: 9000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-admin-route
  namespace: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: toolhive
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
    - name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - $AUTH_HOSTNAME
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: keycloak
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-realm-route
  namespace: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: toolhive
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
    - name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - $AUTH_HOSTNAME
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /realms/toolhive-demo
      backendRefs:
        - name: keycloak
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /js/
      backendRefs:
        - name: keycloak
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /resources/
      backendRefs:
        - name: keycloak
          port: 8080
