# Minimal Prometheus configuration. The only scrape target the demo needs
# is the OTel collector's prometheus exporter (mcp-collector:8889), which
# carries every mcp_*/toolhive_* series. The chart's default scrape jobs for
# kube-apiserver, etcd, kubelet, cadvisor, pods, and services are all
# disabled below — those add ~67k active series (mostly histogram buckets)
# that the bundled dashboards never touch.
server:
  persistentVolume:
    enabled: false

  extraArgs:
    web.enable-remote-write-receiver: ""

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  service:
    type: ClusterIP

# Replaces the chart's default scrape_configs map. Keys not listed here keep
# their chart defaults (enabled), so every default job needs an explicit
# `enabled: false`. The `prometheus` self-scrape stays on (~100 series) for
# diagnosing Prometheus itself.
scrapeConfigs:
  prometheus:
    enabled: true
  kubernetes-api-servers:
    enabled: false
  kubernetes-nodes:
    enabled: false
  kubernetes-nodes-cadvisor:
    enabled: false
  kubernetes-service-endpoints:
    enabled: false
  kubernetes-service-endpoints-slow:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  kubernetes-services:
    enabled: false
  kubernetes-pods:
    enabled: false
  kubernetes-pods-slow:
    enabled: false
  otel-collector:
    job_name: otel-collector
    static_configs:
      - targets:
          - mcp-collector:8889

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: false

kube-state-metrics:
  enabled: false
